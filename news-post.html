<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEWS | Connect Pet</title>
<meta name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#ff8c42;--or2:#e87530;--nv:#0b0e1a;--w:#fff;
  --f1:#fdf8f3;--f2:#faeee5;
  --ink:#1b2138;--ink2:#4a526a;--sil:#94a0b8;--ln:rgba(27,33,56,.08);
  --S:'Zen Kaku Gothic New',sans-serif;
  --B:'Noto Sans JP',sans-serif;
  --M:'DM Mono',monospace;
  --e1:cubic-bezier(.16,1,.3,1);
  --e3:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{
  font-family:var(--B);background:var(--f1);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-feature-settings:"palt" 1;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ── PROGRESS BAR ── */
#progress{
  position:fixed;top:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--or),var(--or2));
  z-index:9999;width:0%;transition:width .1s linear;
}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:500;
  background:rgba(253,248,243,.95);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--ln);
  padding:15px 48px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo img{height:22px;width:auto;display:block}
.nav-logo-fb{font-family:var(--S);font-size:14px;font-weight:700;color:var(--nv);letter-spacing:.05em}
.nav-logo-fb em{color:var(--or);font-style:normal}
.nav-back{
  font-family:var(--M);font-size:11px;letter-spacing:.14em;
  color:var(--sil);display:flex;align-items:center;gap:8px;
  transition:color .25s;
}
.nav-back:hover{color:var(--or)}
.nav-back-arr{transition:transform .25s}
.nav-back:hover .nav-back-arr{transform:translateX(-3px)}

/* ── HERO ── */
.hero{
  width:100%;max-height:520px;overflow:hidden;
  position:relative;background:var(--f2);
}
.hero img{
  width:100%;height:520px;object-fit:cover;
  display:block;
}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 60%,rgba(27,33,56,.35) 100%);
}

/* ── ARTICLE ── */
.article-wrap{max-width:780px;margin:0 auto;padding:52px 24px 96px}

.post-eyebrow{
  font-family:var(--M);font-size:10px;letter-spacing:.28em;
  color:var(--or);display:flex;align-items:center;gap:10px;margin-bottom:18px;
}
.post-eyebrow::before{content:'';width:20px;height:1px;background:var(--or);flex-shrink:0}

.post-title{
  font-family:var(--S);font-size:clamp(26px,4vw,44px);
  font-weight:900;line-height:1.3;color:var(--ink);
  margin-bottom:28px;letter-spacing:-.01em;
}

.post-meta-row{
  display:flex;align-items:center;gap:16px;
  padding-bottom:28px;border-bottom:2px solid var(--or);
  margin-bottom:40px;
}
.post-date{font-family:var(--M);font-size:11px;color:var(--or);letter-spacing:.14em}
.post-share{
  margin-left:auto;display:flex;gap:10px;
}
.share-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--f2);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:background .2s,transform .2s;
}
.share-btn:hover{background:var(--or);transform:scale(1.1)}

/* ── BODY CONTENT ── */
.post-body{
  font-size:16px;line-height:2.1;color:var(--ink2);
  font-feature-settings:"palt" 1;
}
.post-body > * + *{margin-top:22px}
.post-body h1,.post-body h2,.post-body h3{
  font-family:var(--S);font-weight:700;color:var(--ink);
  margin-top:48px;margin-bottom:16px;
}
.post-body h1{font-size:28px;border-bottom:2px solid var(--or);padding-bottom:10px}
.post-body h2{font-size:22px}
.post-body h3{font-size:18px;color:var(--or)}
.post-body p{margin-bottom:20px}
.post-body strong{font-weight:700;color:var(--ink)}
.post-body em{font-style:italic;color:var(--or)}
.post-body a{
  color:var(--or);
  border-bottom:1px solid rgba(255,140,66,.35);
  transition:border-color .2s;
}
.post-body a:hover{border-color:var(--or)}
.post-body ul,.post-body ol{
  padding-left:24px;margin-bottom:20px;
}
.post-body li{margin-bottom:10px;line-height:1.85}
.post-body blockquote{
  border-left:4px solid var(--or);
  padding:16px 20px;background:var(--f2);
  border-radius:0 8px 8px 0;margin:28px 0;
  font-style:italic;color:var(--ink2);
}
.post-body img{
  max-width:100%;border-radius:12px;margin:32px 0;
  box-shadow:0 4px 24px rgba(27,33,56,.1);
}
.post-body hr{border:none;border-top:1px solid var(--ln);margin:40px 0}

/* ── FOOTER BAR ── */
.post-footer{
  margin-top:64px;padding-top:36px;
  border-top:1px solid var(--ln);
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;flex-wrap:wrap;
}
.back-link{
  display:inline-flex;align-items:center;gap:10px;
  font-family:var(--M);font-size:11px;letter-spacing:.16em;
  color:var(--or);padding-bottom:8px;
  border-bottom:1px solid rgba(255,140,66,.3);
  transition:gap .3s,border-color .3s;
}
.back-link:hover{gap:16px;border-color:var(--or)}
.back-link-arr{width:20px;height:1.5px;background:currentColor;position:relative;flex-shrink:0}
.back-link-arr::before{
  content:'';position:absolute;left:-1px;top:-3px;
  width:7px;height:7px;
  border-left:1.5px solid currentColor;border-bottom:1.5px solid currentColor;
  transform:rotate(45deg);
}
.site-link{
  font-family:var(--M);font-size:11px;letter-spacing:.14em;
  color:var(--sil);display:flex;align-items:center;gap:6px;
  transition:color .25s;
}
.site-link:hover{color:var(--or)}

/* ── POST NAV ── */
.post-nav{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:40px}
.post-nav-item{background:var(--f2);border-radius:12px;padding:18px 20px;transition:background .25s,transform .3s;cursor:pointer;border:1.5px solid transparent;display:flex;flex-direction:column;gap:6px;text-decoration:none}
.post-nav-item:hover{background:var(--w);border-color:var(--or);transform:translateY(-2px)}
.post-nav-item.pn-next{text-align:right}
.post-nav-label{font-family:var(--M);font-size:9px;letter-spacing:.2em;color:var(--or);display:flex;align-items:center;gap:6px}
.pn-next .post-nav-label{justify-content:flex-end}
.post-nav-title{font-family:var(--S);font-size:13px;font-weight:700;color:var(--ink);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-nav-date{font-family:var(--M);font-size:9px;color:var(--sil)}
.post-nav-empty{background:transparent;border:1.5px dashed var(--ln);border-radius:12px;padding:18px 20px;display:flex;align-items:center;justify-content:center;color:var(--sil);font-size:12px}
@media(max-width:640px){.post-nav{grid-template-columns:1fr}}

/* ── LOADING / ERROR ── */
.state-wrap{
  min-height:60vh;display:flex;align-items:center;
  justify-content:center;
}
.state-box{text-align:center}
.state-icon{font-size:48px;margin-bottom:20px}
.state-text{font-size:15px;color:var(--sil);line-height:1.8}
.state-link{
  display:inline-block;margin-top:24px;
  font-family:var(--M);font-size:11px;letter-spacing:.14em;
  color:var(--or);border-bottom:1px solid rgba(255,140,66,.3);
  padding-bottom:5px;
}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  nav{padding:13px 20px}
  .hero img{height:240px}
  .article-wrap{padding:36px 20px 72px}
  .post-title{font-size:clamp(22px,6vw,32px)}
  .post-body{font-size:15px;line-height:2.0}
}
</style>
</head>
<body>

<div id="progress"></div>

<nav>
  <a class="nav-logo" href="/">
    <img src="images/connect_pet_logo.png" alt="CONNECT PET"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="nav-logo-fb" style="display:none">CONNECT <em>PET</em></span>
  </a>
  <a class="nav-back" href="/#news">
    <span class="nav-back-arr">←</span> ニュース一覧
  </a>
</nav>

<div id="root">
  <div class="state-wrap">
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <p class="state-text">読み込み中...</p>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://ifccjxzsoozipldjnehu.supabase.co';
const SB_KEY = 'sb_publishable_DXxwbYEqzJlTitVPo9Cciw_UCU6sa7b';

/* 読書進捗バー */
window.addEventListener('scroll', ()=>{
  const d = document.documentElement;
  const pct = (d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100;
  document.getElementById('progress').style.width = Math.min(pct,100) + '%';
});

function fmt(d){
  if(!d) return '';
  const p = d.split('-');
  return `${p[0]}年${parseInt(p[1])}月${parseInt(p[2])}日`;
}

async function load(){
  const id = new URLSearchParams(location.search).get('id');
  if(!id){ showError('記事が見つかりません'); return; }
  try{
    const res  = await fetch(`${SB_URL}/rest/v1/news?id=eq.${id}&select=*`,{
      headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}
    });
    const data = await res.json();
    if(!Array.isArray(data)||!data.length){ showError('記事が見つかりません'); return; }
    render(data[0]);
  }catch(e){ showError('読み込みに失敗しました') }
}

function render(n){
  document.title = `${n.title||'NEWS'} | Connect Pet`;

  /* OGP動的設定 */
  if(n.image_url){
    let og = document.querySelector('meta[property="og:image"]');
    if(!og){ og=document.createElement('meta'); og.setAttribute('property','og:image'); document.head.appendChild(og); }
    og.setAttribute('content', n.image_url);
  }

  const heroHtml = n.image_url
    ? `<div class="hero"><img src="${n.image_url}" alt="${n.title||''}"><div class="hero-grad"></div></div>`
    : '';

  const shareUrl = encodeURIComponent(location.href);
  const shareText = encodeURIComponent(n.title||'');

  document.getElementById('root').innerHTML = `
    ${heroHtml}
    <div class="article-wrap">
      <div class="post-eyebrow">NEWS</div>
      <h1 class="post-title">${n.title||''}</h1>
      <div class="post-meta-row">
        <span class="post-date">${fmt(n.published_at)}</span>
        <div class="post-share">
          <button class="share-btn" title="Xでシェア"
            onclick="window.open('https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}','_blank')">𝕏</button>
          <button class="share-btn" title="LINEでシェア"
            onclick="window.open('https://line.me/R/msg/text/?${shareText}%20${shareUrl}','_blank')">L</button>
          <button class="share-btn" title="URLをコピー" onclick="copyUrl()">🔗</button>
        </div>
      </div>
      <div class="post-body">${n.body||''}</div>
      <div class="post-footer">
        <a class="back-link" href="/#news">
          <span class="back-link-arr"></span> ニュース一覧に戻る
        </a>
        <a class="site-link" href="/">connectpet.jp →</a>
      </div>

      <!-- 前後ページネーション -->
      <div class="post-nav" id="postNav"></div>
    </div>
  `;

  /* 前後記事を取得 */
  loadNavPosts(n.id, n.published_at);
}

async function loadNavPosts(currentId, currentDate){
  try{
    const [prevRes, nextRes] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/news?select=id,title,published_at&is_published=eq.true&published_at=lt.${currentDate}&order=published_at.desc&limit=1`,
        {headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}}),
      fetch(`${SB_URL}/rest/v1/news?select=id,title,published_at&is_published=eq.true&published_at=gt.${currentDate}&order=published_at.asc&limit=1`,
        {headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}})
    ]);
    const [prev, next] = await Promise.all([prevRes.json(), nextRes.json()]);
    const prevPost = Array.isArray(prev)&&prev.length ? prev[0] : null;
    const nextPost = Array.isArray(next)&&next.length ? next[0] : null;

    const fmt2 = d => { if(!d) return ''; const p=d.split('-'); return `${p[0]}.${p[1]}.${p[2]}` };

    const prevHtml = prevPost
      ? `<a class="post-nav-item" href="/news-post.html?id=${prevPost.id}"><span class="post-nav-label">← 前の記事</span><span class="post-nav-title">${prevPost.title}</span><span class="post-nav-date">${fmt2(prevPost.published_at)}</span></a>`
      : `<div class="post-nav-empty">最初の記事です</div>`;

    const nextHtml = nextPost
      ? `<a class="post-nav-item pn-next" href="/news-post.html?id=${nextPost.id}"><span class="post-nav-label">次の記事 →</span><span class="post-nav-title">${nextPost.title}</span><span class="post-nav-date">${fmt2(nextPost.published_at)}</span></a>`
      : `<div class="post-nav-empty">最新の記事です</div>`;

    const nav = document.getElementById('postNav');
    if(nav) nav.innerHTML = prevHtml + nextHtml;
  }catch(e){ /* nav非表示のままでOK */ }
}

function copyUrl(){
  navigator.clipboard?.writeText(location.href).then(()=>{
    const btn = event.target.closest('.share-btn');
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(()=>btn.textContent=orig, 1500);
  });
}

function showError(msg){
  document.getElementById('root').innerHTML = `
    <div class="state-wrap">
      <div class="state-box">
        <div class="state-icon">📭</div>
        <p class="state-text">${msg}</p>
        <a class="state-link" href="/">トップへ戻る</a>
      </div>
    </div>
  `;
}

load();
</script>
</body>
</html>
