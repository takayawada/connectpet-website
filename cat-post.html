<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>猫プロフィール | Connect Pet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#ff8c42;--or2:#e87530;--nv:#0b0e1a;--w:#fff;
  --f1:#fdf8f3;--f2:#faeee5;
  --ink:#1b2138;--ink2:#4a526a;--sil:#94a0b8;--ln:rgba(27,33,56,.08);
  --S:'Zen Kaku Gothic New',sans-serif;
  --B:'Noto Sans JP',sans-serif;
  --M:'DM Mono',monospace;
  --e1:cubic-bezier(.16,1,.3,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--B);background:var(--f1);color:var(--ink);-webkit-font-smoothing:antialiased;font-feature-settings:"palt" 1;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:500;background:rgba(253,248,243,.96);backdrop-filter:blur(24px);border-bottom:1px solid var(--ln);padding:14px 48px;display:flex;align-items:center;justify-content:space-between}
.nav-logo img{height:22px;width:auto}
.nav-logo-fb{font-family:var(--S);font-size:14px;font-weight:700;color:var(--nv)}
.nav-logo-fb em{color:var(--or);font-style:normal}
.nav-back{font-family:var(--M);font-size:11px;letter-spacing:.14em;color:var(--sil);display:flex;align-items:center;gap:8px;transition:color .25s}
.nav-back:hover{color:var(--or)}

/* ── MEDIA SECTION ── */
.media-section{background:var(--nv);padding:40px}
.media-section-inner{width:100%}
/* Photo slider */
.slider{
  position:relative;overflow:hidden;
  width:100%;aspect-ratio:4/3;
  /* max-height削除：aspect-ratioと競合して幅が縮まるため */
}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .5s var(--e1)}
.slide.active{opacity:1;position:relative}
.slide img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}
.slide video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
/* Slider controls */
.slider-prev,.slider-next{
  position:absolute;top:50%;transform:translateY(-50%);z-index:10;
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.slider-prev{left:14px}
.slider-next{right:14px}
.slider-prev:hover,.slider-next:hover{background:rgba(255,255,255,.3)}
/* Dots */
.slider-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:10}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:all .3s}
.dot.active{background:#fff;width:20px;border-radius:4px}
/* Media tabs (photo/video) */
.media-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.08)}
.mtab{
  font-family:var(--M);font-size:11px;letter-spacing:.12em;
  padding:12px 22px;color:rgba(255,255,255,.4);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;
}
.mtab.active{color:#fff;border-bottom-color:var(--or)}
.media-pane{display:none}
.media-pane.active{display:block}

/* ── MAIN CONTENT ── */
.main-wrap{max-width:1100px;margin:0 auto;padding:52px 48px 96px;display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:start}

/* Left: profile */
.profile-top{display:flex;align-items:flex-start;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.cat-name{font-family:var(--S);font-size:clamp(38px,5vw,58px);font-weight:900;color:var(--ink);line-height:1;letter-spacing:-.02em}
.cat-status-badge{
  font-family:var(--B);font-size:11px;font-weight:700;
  padding:6px 16px;border-radius:20px;align-self:center;flex-shrink:0;letter-spacing:.04em;
}
.st-available{background:var(--or);color:#fff;box-shadow:0 2px 12px rgba(255,140,66,.35)}
.st-adopted{background:rgba(27,33,56,.08);color:var(--sil)}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:32px;border-radius:12px;overflow:hidden;border:1px solid var(--ln)}
.info-item{padding:14px 18px;background:var(--w);display:flex;flex-direction:column;gap:3px}
.info-item:nth-child(odd){background:var(--f3,#fff9f5)}
.info-key{font-family:var(--M);font-size:9px;letter-spacing:.2em;color:var(--sil)}
.info-val{font-family:var(--S);font-size:15px;font-weight:700;color:var(--ink)}

/* Health checks */
.checks-section{margin-bottom:32px}
.checks-title{font-family:var(--M);font-size:10px;letter-spacing:.2em;color:var(--sil);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.checks-title::after{content:'';flex:1;height:1px;background:var(--ln)}
.checks-grid{display:flex;gap:8px;flex-wrap:wrap}
.check-badge{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;
}
.check-badge.done{background:#e8f8ee;color:#1a7a3c}
.check-badge.not-done{background:var(--f2);color:var(--sil)}
.check-badge-icon{font-size:14px}

/* Comment */
.comment-section{margin-bottom:32px}
.comment-title{font-family:var(--M);font-size:10px;letter-spacing:.2em;color:var(--sil);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.comment-title::after{content:'';flex:1;height:1px;background:var(--ln)}
.comment-body{font-size:15px;line-height:2.05;color:var(--ink2)}

/* Right: CTA card */
.cta-card{background:var(--w);border-radius:20px;padding:32px 28px;box-shadow:0 4px 28px rgba(27,33,56,.08);position:sticky;top:80px}
.cta-card-title{font-family:var(--S);font-size:18px;font-weight:900;color:var(--ink);margin-bottom:8px;line-height:1.4}
.cta-card-sub{font-size:13px;color:var(--ink2);line-height:1.8;margin-bottom:24px}
.cta-primary{
  display:block;width:100%;
  background:var(--or);color:#fff;text-align:center;
  font-family:var(--B);font-size:14px;font-weight:700;
  padding:16px;border-radius:10px;letter-spacing:.04em;
  transition:background .2s,transform .2s;margin-bottom:10px;
  box-shadow:0 4px 20px rgba(255,140,66,.3);
}
.cta-primary:hover{background:var(--or2);transform:translateY(-2px)}
.cta-secondary{
  display:block;width:100%;text-align:center;
  font-size:12px;color:var(--sil);padding:10px;
  border:1.5px solid var(--ln);border-radius:10px;
  transition:border-color .2s,color .2s;
}
.cta-secondary:hover{border-color:var(--or);color:var(--or)}
.cta-note{font-size:11px;color:var(--sil);text-align:center;margin-top:14px;line-height:1.7}
.cta-divider{border:none;border-top:1px solid var(--ln);margin:22px 0}
.cta-cat-name{font-family:var(--S);font-size:13px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:14px}

/* Back nav */
.post-nav{display:flex;gap:12px;margin-top:48px}
.post-nav-item{
  flex:1;min-width:0;background:var(--w);border-radius:12px;
  padding:16px 18px;border:1.5px solid var(--ln);
  transition:border-color .25s,transform .3s;
  display:flex;flex-direction:column;gap:5px;
  text-decoration:none;
}
.post-nav-item:hover{border-color:var(--or);transform:translateY(-2px)}
.post-nav-item.nav-next{text-align:right}
.nav-dir{font-family:var(--M);font-size:9px;letter-spacing:.2em;color:var(--or)}
.nav-name{font-family:var(--S);font-size:14px;font-weight:700;color:var(--ink)}
.nav-placeholder{flex:1} /* 片方だけある場合のスペーサー */

.nav-skeleton{flex:1;height:60px;background:var(--f2);border-radius:12px;animation:sh 1.5s infinite}
@keyframes sh{0%,100%{opacity:.6}50%{opacity:1}}min-height:60vh;display:flex;align-items:center;justify-content:center}
.state-box{text-align:center}
.state-icon{font-size:56px;margin-bottom:18px}
.state-text{font-size:15px;color:var(--sil)}

@media(max-width:960px){
  .main-wrap{grid-template-columns:1fr;padding:36px 28px 72px}
  .cta-card{position:static;order:2}
  .profile-col{order:1}
  nav{padding:13px 20px}
}
@media(max-width:640px){
  .media-section{padding:20px}
  .main-wrap{padding:28px 20px 64px;gap:28px}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="images/connect_pet_logo.png" alt="CONNECT PET"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="nav-logo-fb" style="display:none">CONNECT <em>PET</em></span>
  </a>
  <a class="nav-back" href="/cats.html">← 猫一覧に戻る</a>
</nav>

<div id="root">
  <div class="state-wrap"><div class="state-box"><div class="state-icon">⏳</div><p class="state-text">読み込み中...</p></div></div>
</div>

<script>
const SB_URL = 'https://ifccjxzsoozipldjnehu.supabase.co';
const SB_KEY = 'sb_publishable_DXxwbYEqzJlTitVPo9Cciw_UCU6sa7b';
const OG     = 'https://storage.googleapis.com/production-os-assets/assets/91e575f0-e275-4bf8-8fb6-04f75bb197f6';

const CHECKS = [
  {key:'has_microchip',  label:'マイクロチップ挿入', icon:'💉'},
  {key:'is_neutered',    label:'避妊・去勢済',       icon:'✂️'},
  {key:'is_vaccinated',  label:'ワクチン接種済',     icon:'💊'},
  {key:'is_fecal_tested',label:'検便検査済',         icon:'🔬'},
  {key:'is_dewormed',    label:'駆虫処置済',         icon:'🛡'},
];

async function load(){
  const id = new URLSearchParams(location.search).get('id');
  if(!id){ showErr('猫の情報が見つかりません'); return; }
  try{
    const res  = await fetch(`${SB_URL}/rest/v1/cats?id=eq.${id}&select=*`,{
      headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}
    });
    const data = await res.json();
    if(!Array.isArray(data)||!data.length){ showErr('猫の情報が見つかりません'); return; }
    render(data[0]);
    loadNav(data[0]);
  }catch(e){ showErr('読み込みに失敗しました') }
}

function render(c){
  document.title = `${c.name||'猫プロフィール'} | Connect Pet`;
  const photos = Array.isArray(c.photos)&&c.photos.length ? c.photos : [OG];
  const hasVideo = !!c.video_url;
  const adopted  = c.status === 'adopted';

  /* ── Media section ── */
  const hasMultiple = photos.length > 1;
  const slideItems  = photos.map((p,i)=>`<div class="slide${i===0?' active':''}" data-idx="${i}"><img src="${p}" alt="${c.name||''}" onerror="this.src='${OG}'"></div>`).join('');
  const videoTab    = hasVideo ? `<button class="mtab" data-pane="video">動画</button>` : '';
  const videoPane   = hasVideo ? `<div class="media-pane" id="paneVideo"><video src="${c.video_url}" controls style="width:100%;background:#000"></video></div>` : '';
  const dots        = hasMultiple ? photos.map((_,i)=>`<span class="dot${i===0?' active':''}" data-i="${i}"></span>`).join('') : '';
  const arrows      = hasMultiple ? `<button class="slider-prev" onclick="slide(-1)">←</button><button class="slider-next" onclick="slide(1)">→</button>` : '';
  const tabsBar     = hasVideo ? `<div class="media-tabs"><button class="mtab active" data-pane="photos">写真</button>${videoTab}</div>` : '';

  /* ── Info grid ── */
  const gLabel = c.gender==='male'?'オス':c.gender==='female'?'メス':'—';
  const ageDisplay = c.age ? (/[歳月年後]/.test(c.age) ? c.age : c.age + '歳') : '—';
  const infoRows=[
    ['性別', gLabel],['年齢', ageDisplay],
    ['毛色', c.color||'—'],['出身', c.origin||'—'],
  ].map(([k,v])=>`<div class="info-item"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('');

  /* ── Health checks ── */
  const checkBadges = CHECKS.map(ch=>`
    <span class="check-badge ${c[ch.key]?'done':'not-done'}">
      <span class="check-badge-icon">${c[ch.key]?'✓':'—'}</span>${ch.label}
    </span>`).join('');

  document.getElementById('root').innerHTML = `
    <div class="media-section">
      ${tabsBar}
      <div class="media-section-inner">
        <div class="media-pane active" id="panePhotos">
          <div class="slider" id="slider">
            ${slideItems}
            ${arrows}
            ${dots?`<div class="slider-dots">${dots}</div>`:''}
          </div>
        </div>
        ${hasVideo?`<div class="media-pane" id="paneVideo"><div class="slider" style="aspect-ratio:4/3"><video src="${c.video_url}" controls style="width:100%;height:100%;object-fit:contain;background:#000"></video></div></div>`:''}
      </div>
    </div>

    <div class="main-wrap">
      <div class="profile-col">
        <div class="profile-top">
          <h1 class="cat-name">${c.name||'名前未設定'}</h1>
          <span class="cat-status-badge ${adopted?'st-adopted':'st-available'}">${adopted?'譲渡済み 🏠':'在籍中'}</span>
        </div>

        <div class="info-grid">${infoRows}</div>

        <div class="checks-section">
          <div class="checks-title">健康チェック</div>
          <div class="checks-grid">${checkBadges}</div>
        </div>

        ${c.comment?`
        <div class="comment-section">
          <div class="comment-title">紹介コメント</div>
          <p class="comment-body">${c.comment}</p>
        </div>`:``}

      <div class="post-nav" id="postNav">
        <div class="nav-skeleton"></div>
        <div class="nav-skeleton"></div>
      </div>
      <!-- 猫一覧ボタン -->
      <div style="text-align:center;margin-top:28px">
        <a href="/cats.html" style="display:inline-flex;align-items:center;gap:10px;font-family:var(--M);font-size:11px;letter-spacing:.16em;color:var(--or);border:1.5px solid var(--or);padding:12px 28px;border-radius:8px;transition:all .25s">
          ← 在籍猫を一覧で見る
        </a>
      </div>
      </div>

      <!-- CTA card -->
      <div class="cta-card">
        ${adopted
          ? `<p class="cta-card-title">この子は譲渡済みです 🏠</p>
             <p class="cta-card-sub">他にも里親を待っている猫がいます。一覧をご覧ください。</p>
             <a class="cta-primary" href="/cats.html">他の猫を見る →</a>`
          : `<p class="cta-cat-name">${c.name||'この子'}の里親になりたい方へ</p>
             <p class="cta-card-title">まずは<br>お気軽にご連絡ください</p>
             <p class="cta-card-sub">見学のご予約・ご質問など、なんでもお問い合わせいただけます。費用や手続きも丁寧にご説明します。</p>
             <a class="cta-primary" href="/contact.html?cat=${encodeURIComponent(c.name||'')}">無料でお問い合わせ →</a>
             <a class="cta-secondary" href="/cats.html">他の猫も見てみる</a>
             <p class="cta-note">見学のみのご予約も歓迎です</p>
             <hr class="cta-divider">
             <p style="font-size:11px;color:var(--sil);text-align:center;line-height:1.7">里親になるための流れ<br>お問い合わせ → 見学 → 審査 → 譲渡</p>`
        }
      </div>
    </div>
  `;

  /* media tab events */
  document.querySelectorAll('.mtab').forEach(t=>{
    t.addEventListener('click',()=>{
      document.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.media-pane').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('pane'+t.dataset.pane.charAt(0).toUpperCase()+t.dataset.pane.slice(1))?.classList.add('active');
    });
  });

  initSlider();
}

/* ── Slider ── */
let sliderIdx = 0, slides = [], dotEls = [];
function initSlider(){
  slides  = Array.from(document.querySelectorAll('.slide'));
  dotEls  = Array.from(document.querySelectorAll('.slider-dots .dot'));
  dotEls.forEach((d,i)=>d.addEventListener('click',()=>goSlide(i)));
}
function slide(dir){ goSlide((sliderIdx + dir + slides.length) % slides.length) }
function goSlide(i){
  if(!slides.length) return;
  slides[sliderIdx].classList.remove('active');
  dotEls[sliderIdx]?.classList.remove('active');
  sliderIdx = i;
  slides[sliderIdx].classList.add('active');
  dotEls[sliderIdx]?.classList.add('active');
}

/* ── Adjacent cats ── */
async function loadNav(c){
  const nav = document.getElementById('postNav');
  if(!nav) return;
  try{
    /* 全catのidリストを取得して前後を探す */
    const res = await fetch(
      `${SB_URL}/rest/v1/cats?select=id,name&order=id.asc`,
      {headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`}}
    );
    const all = await res.json();
    if(!Array.isArray(all)||!all.length){ nav.innerHTML=''; return; }

    const idx = all.findIndex(x=>x.id===c.id);
    const p   = idx > 0              ? all[idx-1] : null;
    const n   = idx < all.length-1   ? all[idx+1] : null;

    /* 両方ない場合はナビを非表示 */
    if(!p && !n){ nav.innerHTML=''; return; }

    const prevHtml = p
      ? `<a class="post-nav-item" href="/cat-post.html?id=${p.id}">
           <span class="nav-dir">← 前の子</span>
           <span class="nav-name">${p.name}</span>
         </a>`
      : `<div class="nav-placeholder"></div>`;

    const nextHtml = n
      ? `<a class="post-nav-item nav-next" href="/cat-post.html?id=${n.id}">
           <span class="nav-dir">次の子 →</span>
           <span class="nav-name">${n.name}</span>
         </a>`
      : `<div class="nav-placeholder"></div>`;

    nav.innerHTML = prevHtml + nextHtml;
  }catch(e){ nav.innerHTML=''; }
}

function showErr(msg){
  document.getElementById('root').innerHTML=`<div class="state-wrap"><div class="state-box"><div class="state-icon">🐾</div><p class="state-text">${msg}</p><a href="/cats.html" style="display:inline-block;margin-top:20px;color:var(--or);font-size:13px">猫一覧に戻る</a></div></div>`;
}

load();
</script>
</body>
</html>
