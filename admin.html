<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEWS管理 | Connect Pet</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#ff8c42;--nv:#0b0e1a;--w:#fff;
  --f1:#f8f9fa;--f2:#f1f3f5;
  --ink:#1b2138;--ink2:#6c757d;
  --bd:#dee2e6;--err:#e74c3c;--ok:#27ae60;
  --B:'Noto Sans JP',sans-serif;--M:'DM Mono',monospace;
  --r:10px;--sh:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:var(--B);background:var(--f1);color:var(--ink);min-height:100vh}

/* ─── LOGIN ─── */
#login{position:fixed;inset:0;background:var(--nv);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--w);border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.login-logo{font-family:var(--B);font-size:18px;font-weight:700;color:var(--nv);letter-spacing:.06em;margin-bottom:8px}
.login-logo em{color:var(--or);font-style:normal}
.login-sub{font-size:13px;color:var(--ink2);margin-bottom:32px}
.login-label{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.06em;display:block;margin-bottom:8px}
.login-input{width:100%;padding:12px 16px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:var(--B);outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--or)}
.login-btn{width:100%;margin-top:20px;padding:14px;background:var(--or);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:var(--B);cursor:pointer;letter-spacing:.06em;transition:background .2s,transform .2s}
.login-btn:hover{background:#e87530;transform:translateY(-1px)}
.login-err{color:var(--err);font-size:12px;margin-top:10px;display:none}

/* ─── LAYOUT ─── */
#app{display:none}
.header{background:var(--nv);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.06em}
.header-logo em{color:var(--or);font-style:normal}
.header-right{display:flex;align-items:center;gap:16px}
.header-site{font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;letter-spacing:.06em;transition:color .2s}
.header-site:hover{color:var(--or)}
.logout-btn{font-size:12px;color:rgba(255,255,255,.4);background:none;border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--B);transition:all .2s}
.logout-btn:hover{border-color:var(--or);color:var(--or)}

.main{max-width:1200px;margin:0 auto;padding:32px 24px;display:grid;grid-template-columns:320px 1fr;gap:24px;align-items:start}

/* ─── NEWS LIST ─── */
.panel{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.panel-head{padding:20px 24px;border-bottom:1px solid var(--f2);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:14px;font-weight:700;color:var(--ink)}
.btn-new{background:var(--or);color:#fff;border:none;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;font-family:var(--B);cursor:pointer;letter-spacing:.04em;transition:background .2s}
.btn-new:hover{background:#e87530}
.news-list{list-style:none}
.news-item{padding:16px 24px;border-bottom:1px solid var(--f2);cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:4px}
.news-item:hover{background:var(--f1)}
.news-item.active{background:#fff4ee;border-left:3px solid var(--or)}
.news-item-title{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.news-item-meta{display:flex;align-items:center;gap:8px}
.news-item-date{font-family:var(--M);font-size:10px;color:var(--ink2)}
.badge{font-size:9px;font-family:var(--M);padding:2px 8px;border-radius:20px;letter-spacing:.06em}
.badge-pub{background:#d4edda;color:#155724}
.badge-draft{background:#f8d7da;color:#721c24}
.news-empty{padding:40px 24px;text-align:center;color:var(--ink2);font-size:13px}

/* ─── EDITOR ─── */
.editor-panel{background:var(--w);border-radius:var(--r);box-shadow:var(--sh)}
.editor-head{padding:20px 28px;border-bottom:1px solid var(--f2);display:flex;align-items:center;justify-content:space-between}
.editor-title-text{font-size:14px;font-weight:700;color:var(--ink)}
.editor-actions{display:flex;gap:10px}
.btn-draft{background:var(--f2);color:var(--ink);border:none;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;font-family:var(--B);cursor:pointer;transition:background .2s}
.btn-draft:hover{background:var(--bd)}
.btn-pub{background:var(--ok);color:#fff;border:none;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;font-family:var(--B);cursor:pointer;transition:background .2s}
.btn-pub:hover{background:#219a52}
.btn-del{background:none;color:var(--err);border:1px solid var(--err);padding:8px 14px;border-radius:7px;font-size:12px;font-weight:700;font-family:var(--B);cursor:pointer;transition:all .2s}
.btn-del:hover{background:var(--err);color:#fff}

.editor-body{padding:28px}
.form-row{margin-bottom:20px}
.form-label{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.06em;display:block;margin-bottom:8px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;font-family:var(--B);outline:none;transition:border-color .2s;background:var(--w)}
.form-input:focus{border-color:var(--or)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-toggle{display:flex;align-items:center;gap:12px}
.toggle{position:relative;width:48px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bd);border-radius:13px;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--ok)}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider::before{transform:translateX(22px)}
.toggle-label{font-size:13px;color:var(--ink)}

/* AI生成 */
.ai-box{background:linear-gradient(135deg,#fff4ee,#fff9f5);border:1.5px solid rgba(255,140,66,.25);border-radius:10px;padding:20px;margin-bottom:20px}
.ai-box-title{font-size:12px;font-weight:700;color:var(--or);letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ai-hint{font-size:12px;color:var(--ink2);margin-bottom:12px;line-height:1.6}
.ai-input-row{display:flex;gap:10px}
.ai-input{flex:1;padding:10px 14px;border:1.5px solid rgba(255,140,66,.3);border-radius:8px;font-size:13px;font-family:var(--B);outline:none;background:#fff;transition:border-color .2s}
.ai-input:focus{border-color:var(--or)}
.ai-btn{background:var(--or);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--B);cursor:pointer;white-space:nowrap;transition:background .2s}
.ai-btn:hover{background:#e87530}
.ai-btn:disabled{background:var(--bd);cursor:not-allowed}
.ai-opts{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ai-opt{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,140,66,.3);background:#fff;color:var(--ink2);cursor:pointer;font-family:var(--B);transition:all .2s}
.ai-opt:hover,.ai-opt.sel{background:var(--or);color:#fff;border-color:var(--or)}

/* ─── IMAGE UPLOAD ─── */
.upload-area{
  border:2px dashed var(--bd);border-radius:10px;
  min-height:140px;cursor:pointer;transition:all .2s;
  position:relative;overflow:hidden;background:var(--f1);
}
.upload-area:hover{border-color:var(--or);background:#fff9f5}
.upload-area.drag{border-color:var(--or);background:#fff4ee;transform:scale(1.01)}
.upload-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:8px;pointer-events:none}
.upload-icon{font-size:32px;line-height:1}
.upload-text{font-size:13px;font-weight:700;color:var(--ink)}
.upload-sub{font-size:11px;color:var(--ink2)}
.upload-preview{position:relative;width:100%}
.upload-preview img{width:100%;max-height:220px;object-fit:cover;display:block}
.upload-remove{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--B);transition:background .2s}
.upload-remove:hover{background:rgba(0,0,0,.85)}
.upload-progress{padding:24px 28px;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.progress-bar{height:6px;background:var(--f2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--or);border-radius:3px;width:0%;transition:width .3s}
.progress-text{font-size:12px;color:var(--ink2)}
.ql-container{font-family:var(--B);font-size:14px;border-radius:0 0 8px 8px;border:1.5px solid var(--bd);border-top:none}
.ql-toolbar{border-radius:8px 8px 0 0;border:1.5px solid var(--bd)}
.ql-editor{min-height:280px;line-height:1.8}

/* toast */
.toast{position:fixed;bottom:32px;right:32px;background:var(--nv);color:#fff;padding:14px 22px;border-radius:10px;font-size:13px;font-weight:500;display:none;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--err)}

/* loading */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .main{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo"><img src="images/connect_pet_logo.png" alt="CONNECT PET" style="height:28px;width:auto"></div>
    <p class="login-sub">NEWS管理画面</p>
    <label class="login-label">パスワード</label>
    <input class="login-input" type="password" id="pw" placeholder="パスワードを入力" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <p class="login-err" id="login-err">パスワードが違います</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="header-logo"><img src="images/connect_pet_logo.png" alt="CONNECT PET" style="height:22px;width:auto;filter:brightness(0) invert(1)"> — NEWS管理</div>
    <div class="header-right">
      <a class="header-site" href="/" target="_blank">サイトを見る →</a>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <div class="main">
    <!-- LIST -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">投稿一覧</span>
        <button class="btn-new" onclick="newPost()">＋ 新規作成</button>
      </div>
      <ul class="news-list" id="newsList">
        <li class="news-empty">読み込み中...</li>
      </ul>
    </div>

    <!-- EDITOR -->
    <div class="editor-panel" id="editorPanel">
      <div class="editor-head">
        <span class="editor-title-text" id="editorMode">新規作成</span>
        <div class="editor-actions">
          <button class="btn-draft" onclick="savePost(false)">下書き保存</button>
          <button class="btn-pub"   onclick="savePost(true)">公開する</button>
          <button class="btn-del"   onclick="deletePost()" id="btnDel" style="display:none">削除</button>
        </div>
      </div>
      <div class="editor-body">

        <!-- AI生成 -->
        <div class="ai-box">
          <div class="ai-box-title">✦ AI文章生成（Claude）</div>
          <p class="ai-hint">キーワードや概要を入力するとAIが文章を生成します。生成後に自由に編集できます。</p>
          <div class="ai-opts">
            <span class="ai-opt sel" data-tone="formal">丁寧・フォーマル</span>
            <span class="ai-opt" data-tone="casual">親しみやすい</span>
            <span class="ai-opt" data-tone="news">ニュース風</span>
          </div>
          <div class="ai-input-row">
            <input class="ai-input" id="aiPrompt" placeholder="例：Paw Meと提携しました。保護猫にごはんをあげるアプリ…">
            <button class="ai-btn" id="aiBtn" onclick="generateAI()">生成</button>
          </div>
        </div>

        <!-- FORM -->
        <div class="form-row">
          <label class="form-label">タイトル *</label>
          <input class="form-input" id="fTitle" placeholder="記事のタイトルを入力">
        </div>

        <div class="form-row form-row-2">
          <div>
            <label class="form-label">公開日</label>
            <input class="form-input" id="fDate" type="date">
          </div>
          <div>
            <label class="form-label">スラッグ（URL）</label>
            <input class="form-input" id="fSlug" placeholder="news-title-here">
          </div>
        </div>

        <div class="form-row">
          <label class="form-label">アイキャッチ画像</label>
          <!-- アップロードエリア -->
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
            <div class="upload-inner" id="uploadInner">
              <div class="upload-icon">🖼</div>
              <div class="upload-text">クリックまたはドラッグ＆ドロップで画像を追加</div>
              <div class="upload-sub">JPG・PNG・WebP・GIF 対応</div>
            </div>
            <div class="upload-preview" id="uploadPreview" style="display:none">
              <img id="uploadPreviewImg" alt="">
              <button class="upload-remove" onclick="removeImage(event)">✕ 画像を変更</button>
            </div>
            <div class="upload-progress" id="uploadProgress" style="display:none">
              <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
              <span class="progress-text">アップロード中...</span>
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(this.files[0])">
          <input type="hidden" id="fImage">
        </div>

        <div class="form-row">
          <label class="form-label">本文</label>
          <div id="quill"></div>
        </div>

        

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
/* ─── CONFIG ─── */
const SUPABASE_URL = 'https://ifccjxzsoozipldjnehu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DXxwbYEqzJlTitVPo9Cciw_UCU6sa7b';
const ADMIN_PASS   = 'connectpet2024'; /* ← 必要に応じてパスワード変更 */

/* ─── LOGIN ─── */
function doLogin(){
  const pw = document.getElementById('pw').value;
  if(pw === ADMIN_PASS){
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display   = 'block';
    loadNews();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout(){
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display   = 'none';
  document.getElementById('pw').value = '';
}

/* ─── QUILL ─── */
const quill = new Quill('#quill', {
  theme: 'snow',
  placeholder: '本文を入力してください...',
  modules: {
    toolbar: [
      [{ header: [1,2,3,false] }],
      ['bold','italic','underline'],
      [{ color:[] },{ background:[] }],
      [{ list:'ordered' },{ list:'bullet' }],
      ['link','image'],
      ['clean']
    ]
  }
});

/* ─── AI TONE ─── */
let aiTone = 'formal';
document.querySelectorAll('.ai-opt').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.ai-opt').forEach(x => x.classList.remove('sel'));
    el.classList.add('sel');
    aiTone = el.dataset.tone;
  });
});

/* ─── AI GENERATE ─── */
async function generateAI(){
  const prompt = document.getElementById('aiPrompt').value.trim();
  if(!prompt){ showToast('キーワードを入力してください', 'err'); return; }
  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>生成中...';

  const toneMap = {
    formal: '丁寧でフォーマルな敬語',
    casual: '親しみやすいフレンドリー',
    news:   'ニュースリリース風のプロフェッショナル'
  };

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '', /* Claude APIキーをここに入力 */
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `株式会社Connect Pet（ペットの殺処分ゼロをビジネスで実現する会社）のNEWS記事を書いてください。
トーン：${toneMap[aiTone]}
内容：${prompt}
タイトルと本文（400〜600文字）をJSON形式で返してください。
{"title":"タイトル","body":"本文HTML（<p><strong><ul>などのタグ使用可）"}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    if(parsed.title) document.getElementById('fTitle').value = parsed.title;
    if(parsed.body)  quill.clipboard.dangerouslyPasteHTML(parsed.body);
    showToast('AI生成完了！編集してから保存してください', 'ok');
  } catch(e) {
    showToast('AI生成に失敗しました（APIキーを設定してください）', 'err');
  }
  btn.disabled = false;
  btn.textContent = '生成';
}

/* ─── SUPABASE ─── */
async function sbFetch(path, options={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers
    },
    ...options
  });
  if(!res.ok && res.status !== 204) throw new Error(await res.text());
  if(res.status === 204) return null;
  return res.json();
}

/* ─── LOAD NEWS ─── */
let allNews = [];
let currentId = null;

async function loadNews(){
  try {
    allNews = await sbFetch('news?select=*&order=published_at.desc,id.desc');
    renderList();
  } catch(e) {
    document.getElementById('newsList').innerHTML = '<li class="news-empty">読み込み失敗</li>';
  }
}

function renderList(){
  const ul = document.getElementById('newsList');
  if(!allNews.length){
    ul.innerHTML = '<li class="news-empty">投稿がありません</li>';
    return;
  }
  ul.innerHTML = allNews.map(n => `
    <li class="news-item${currentId===n.id?' active':''}" onclick="editPost(${n.id})">
      <div class="news-item-title">${n.title||'（タイトルなし）'}</div>
      <div class="news-item-meta">
        <span class="news-item-date">${n.published_at||''}</span>
        <span class="badge ${n.is_published?'badge-pub':'badge-draft'}">${n.is_published?'公開中':'下書き'}</span>
      </div>
    </li>
  `).join('');
}

/* ─── NEW POST ─── */
function newPost(){
  currentId = null;
  document.getElementById('editorMode').textContent = '新規作成';
  document.getElementById('btnDel').style.display = 'none';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fSlug').value = '';
  document.getElementById('fImage').value = '';
  document.getElementById('fPublished').checked = false;
  document.getElementById('uploadPreview').style.display = 'none';
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('uploadInner').style.display = 'flex';
  quill.setText('');
  renderList();
}

/* ─── IMAGE UPLOAD ─── */
function onDragOver(e){e.preventDefault();document.getElementById('uploadArea').classList.add('drag')}
function onDragLeave(e){document.getElementById('uploadArea').classList.remove('drag')}
function onDrop(e){e.preventDefault();document.getElementById('uploadArea').classList.remove('drag');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))handleFileSelect(f)}

async function handleFileSelect(file){
  if(!file)return;
  const area=document.getElementById('uploadArea');
  const inner=document.getElementById('uploadInner');
  const preview=document.getElementById('uploadPreview');
  const progress=document.getElementById('uploadProgress');
  const fill=document.getElementById('progressFill');

  inner.style.display='none';
  preview.style.display='none';
  progress.style.display='flex';

  /* アニメーション */
  let pct=0;
  const timer=setInterval(()=>{pct=Math.min(pct+Math.random()*15,90);fill.style.width=pct+'%'},200);

  try{
    const ext=file.name.split('.').pop();
    const fname=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const res=await fetch(`${SUPABASE_URL}/storage/v1/object/news-images/${fname}`,{
      method:'POST',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':`Bearer ${SUPABASE_KEY}`,
        'Content-Type':file.type,
        'x-upsert':'true'
      },
      body:file
    });
    if(!res.ok)throw new Error(await res.text());
    clearInterval(timer);fill.style.width='100%';
    const publicUrl=`${SUPABASE_URL}/storage/v1/object/public/news-images/${fname}`;
    document.getElementById('fImage').value=publicUrl;
    setTimeout(()=>{
      progress.style.display='none';
      document.getElementById('uploadPreviewImg').src=publicUrl;
      preview.style.display='block';
    },400);
    showToast('画像をアップロードしました','ok');
  }catch(e){
    clearInterval(timer);
    progress.style.display='none';
    inner.style.display='flex';
    showToast('アップロード失敗：'+e.message,'err');
  }
}

function removeImage(e){
  e.stopPropagation();
  document.getElementById('fImage').value='';
  document.getElementById('uploadPreview').style.display='none';
  document.getElementById('uploadInner').style.display='flex';
}

/* ─── EDIT POST (画像プレビュー対応) ─── */
function editPost(id){
  const n = allNews.find(x => x.id === id);
  if(!n) return;
  currentId = id;
  document.getElementById('editorMode').textContent = '編集中';
  document.getElementById('btnDel').style.display = 'inline-block';
  document.getElementById('fTitle').value     = n.title || '';
  document.getElementById('fDate').value      = n.published_at || '';
  document.getElementById('fSlug').value      = n.slug || '';
  document.getElementById('fImage').value     = n.image_url || '';
  document.getElementById('fPublished').checked = !!n.is_published;
  quill.clipboard.dangerouslyPasteHTML(n.body || '');
  if(n.image_url){
    document.getElementById('uploadPreviewImg').src = n.image_url;
    document.getElementById('uploadPreview').style.display = 'block';
    document.getElementById('uploadInner').style.display = 'none';
    document.getElementById('uploadProgress').style.display = 'none';
  } else {
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('uploadInner').style.display = 'flex';
  }
  renderList();
}

/* ─── SAVE ─── */
async function savePost(publish){
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ showToast('タイトルを入力してください', 'err'); return; }

  const data = {
    title,
    body:         quill.root.innerHTML,
    image_url:    document.getElementById('fImage').value.trim(),
    published_at: document.getElementById('fDate').value,
    slug:         document.getElementById('fSlug').value.trim() || slugify(title),
    is_published: publish ?? document.getElementById('fPublished').checked
  };

  try {
    if(currentId){
      await sbFetch(`news?id=eq.${currentId}`, {
        method: 'PATCH', prefer: 'return=minimal',
        body: JSON.stringify(data)
      });
    } else {
      const res = await sbFetch('news', {
        method: 'POST', prefer: 'return=representation',
        body: JSON.stringify(data)
      });
      if(res?.[0]) currentId = res[0].id;
    }
    showToast(publish ? '公開しました！' : '下書きを保存しました', 'ok');
    await loadNews();
    renderList();
    document.getElementById('btnDel').style.display = 'inline-block';
    document.getElementById('editorMode').textContent = '編集中';
  } catch(e) {
    showToast('保存に失敗しました: ' + e.message, 'err');
  }
}

/* ─── DELETE ─── */
async function deletePost(){
  if(!currentId) return;
  if(!confirm('この記事を削除しますか？')) return;
  try {
    await sbFetch(`news?id=eq.${currentId}`, { method: 'DELETE', prefer: 'return=minimal' });
    showToast('削除しました', 'ok');
    newPost();
    await loadNews();
  } catch(e) {
    showToast('削除に失敗しました', 'err');
  }
}

/* ─── UTILS ─── */
function slugify(str){
  return str.toLowerCase()
    .replace(/[\s　]+/g,'-')
    .replace(/[^\w\-]/g,'')
    .slice(0,60) || 'post-' + Date.now();
}

function previewImage(url){
  const wrap = document.getElementById('imgPreview');
  const el   = document.getElementById('imgPreviewEl');
  if(url){ el.src = url; wrap.style.display = 'block'; }
  else { wrap.style.display = 'none'; }
}

function showToast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

/* 今日の日付をデフォルトに */
document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
</script>
