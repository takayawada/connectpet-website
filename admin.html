<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEWS管理 | Connect Pet</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#ff8c42;--nv:#0b0e1a;--w:#fff;
  --f1:#f8f9fa;--f2:#f1f3f5;
  --ink:#1b2138;--ink2:#6c757d;
  --bd:#dee2e6;--err:#e74c3c;--ok:#27ae60;
  --B:'Noto Sans JP',sans-serif;
}
body{font-family:var(--B);background:var(--f1);color:var(--ink);min-height:100vh}

/* LOGIN */
#loginScreen{
  position:fixed;inset:0;background:var(--nv);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-box{
  background:var(--w);border-radius:16px;
  padding:48px 40px;width:100%;max-width:380px;
}
.login-logo{margin-bottom:24px;text-align:center}
.login-logo img{height:28px;width:auto}
.login-sub{font-size:13px;color:var(--ink2);text-align:center;margin-bottom:28px}
.login-label{font-size:12px;font-weight:700;display:block;margin-bottom:8px;letter-spacing:.06em}
.login-input{
  width:100%;padding:12px 16px;border:1.5px solid var(--bd);
  border-radius:8px;font-size:14px;font-family:var(--B);
  outline:none;transition:border-color .2s;
}
.login-input:focus{border-color:var(--or)}
.login-btn{
  width:100%;margin-top:16px;padding:14px;
  background:var(--or);color:#fff;border:none;
  border-radius:8px;font-size:14px;font-weight:700;
  font-family:var(--B);cursor:pointer;letter-spacing:.06em;
  transition:background .2s;
}
.login-btn:hover{background:#e87530}
.login-err{color:var(--err);font-size:12px;margin-top:10px;text-align:center;display:none}

/* APP */
#appScreen{display:none}
.header{
  background:var(--nv);height:60px;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-logo img{height:22px;filter:brightness(0) invert(1)}
.header-right{display:flex;align-items:center;gap:16px}
.header-link{font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}
.header-link:hover{color:var(--or)}
.logout-btn{
  font-size:12px;color:rgba(255,255,255,.4);background:none;
  border:1px solid rgba(255,255,255,.2);padding:6px 14px;
  border-radius:6px;cursor:pointer;font-family:var(--B);transition:all .2s;
}
.logout-btn:hover{border-color:var(--or);color:var(--or)}

.layout{max-width:1200px;margin:0 auto;padding:28px 20px;display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}

/* LIST PANEL */
.list-panel{background:var(--w);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}
.list-head{padding:18px 20px;border-bottom:1px solid var(--f2);display:flex;align-items:center;justify-content:space-between}
.list-title{font-size:14px;font-weight:700}
.btn-new{
  background:var(--or);color:#fff;border:none;
  padding:7px 14px;border-radius:7px;font-size:12px;
  font-weight:700;font-family:var(--B);cursor:pointer;
}
.btn-new:hover{background:#e87530}
.news-list{list-style:none;max-height:calc(100vh - 200px);overflow-y:auto}
.news-item{
  padding:14px 20px;border-bottom:1px solid var(--f2);
  cursor:pointer;transition:background .15s;
}
.news-item:hover{background:var(--f1)}
.news-item.active{background:#fff4ee;border-left:3px solid var(--or)}
.item-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.item-meta{display:flex;align-items:center;gap:8px}
.item-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink2)}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}
.badge-pub{background:#d4edda;color:#155724}
.badge-draft{background:#f8d7da;color:#721c24}
.list-empty{padding:40px 20px;text-align:center;color:var(--ink2);font-size:13px}

/* EDITOR PANEL */
.editor-panel{background:var(--w);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.editor-head{
  padding:18px 24px;border-bottom:1px solid var(--f2);
  display:flex;align-items:center;justify-content:space-between;
}
.editor-mode{font-size:14px;font-weight:700}
.editor-btns{display:flex;gap:8px}
.btn-draft{
  background:var(--f2);color:var(--ink);border:none;
  padding:8px 16px;border-radius:7px;font-size:12px;
  font-weight:700;font-family:var(--B);cursor:pointer;
}
.btn-draft:hover{background:var(--bd)}
.btn-pub{
  background:var(--ok);color:#fff;border:none;
  padding:8px 16px;border-radius:7px;font-size:12px;
  font-weight:700;font-family:var(--B);cursor:pointer;
}
.btn-pub:hover{background:#219a52}
.btn-del{
  background:none;color:var(--err);
  border:1px solid var(--err);padding:8px 14px;
  border-radius:7px;font-size:12px;font-weight:700;
  font-family:var(--B);cursor:pointer;transition:all .2s;
}
.btn-del:hover{background:var(--err);color:#fff}

.editor-body{padding:24px}
.field{margin-bottom:18px}
.field-label{font-size:12px;font-weight:700;letter-spacing:.06em;display:block;margin-bottom:7px}
.field-input{
  width:100%;padding:10px 14px;border:1.5px solid var(--bd);
  border-radius:8px;font-size:14px;font-family:var(--B);
  outline:none;transition:border-color .2s;
}
.field-input:focus{border-color:var(--or)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Upload */
.upload-zone{
  border:2px dashed var(--bd);border-radius:10px;
  min-height:130px;cursor:pointer;transition:all .2s;
  background:var(--f1);position:relative;overflow:hidden;
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--or);background:#fff9f5}
.upload-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:28px;gap:7px;pointer-events:none;
}
.upload-empty-icon{font-size:28px}
.upload-empty-text{font-size:13px;font-weight:700;color:var(--ink)}
.upload-empty-sub{font-size:11px;color:var(--ink2)}
.upload-img-wrap{display:none;position:relative}
.upload-img-wrap img{width:100%;max-height:200px;object-fit:cover;display:block}
.upload-img-remove{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.6);color:#fff;border:none;
  padding:5px 10px;border-radius:6px;font-size:11px;
  cursor:pointer;font-family:var(--B);
}
.upload-progress-wrap{display:none;padding:20px 24px;flex-direction:column;gap:8px}
.progress-bar{height:5px;background:var(--f2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--or);border-radius:3px;width:0;transition:width .3s}
.progress-text{font-size:12px;color:var(--ink2)}

/* AI Box */
.ai-box{background:linear-gradient(135deg,#fff9f5,#fff);border:1.5px solid rgba(255,140,66,.22);border-radius:10px;padding:16px 18px;margin-bottom:18px}
.ai-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ai-label{font-size:12px;font-weight:700;color:var(--or);letter-spacing:.06em}
.ai-hint{font-size:11px;color:var(--ink2)}
.ai-row{display:flex;gap:10px}
.ai-btn{background:var(--or);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--B);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .2s}
.ai-btn:hover{background:#e87530}
.ai-btn:disabled{background:var(--bd);cursor:not-allowed}
/* Video */
.video-zone{border:2px dashed var(--bd);border-radius:10px;min-height:100px;cursor:pointer;transition:all .2s;background:var(--f1);position:relative;overflow:hidden}
.video-zone:hover{border-color:var(--or);background:#fff9f5}
.video-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:6px;pointer-events:none}
.video-preview-wrap{display:none}
.video-preview-wrap video{width:100%;max-height:220px;display:block;border-radius:8px}
.video-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--B)}
.ql-toolbar{border-radius:8px 8px 0 0;border:1.5px solid var(--bd)}
.ql-container{border-radius:0 0 8px 8px;border:1.5px solid var(--bd);border-top:none;font-family:var(--B);font-size:14px}
.ql-editor{min-height:240px;line-height:1.8}

/* Toast */
.toast{
  position:fixed;bottom:28px;right:28px;
  padding:12px 20px;border-radius:10px;
  font-size:13px;font-weight:500;color:#fff;
  display:none;z-index:9999;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--err)}

@media(max-width:860px){
  .layout{grid-template-columns:1fr}
  .news-list{max-height:200px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="images/connect_pet_logo.png" alt="CONNECT PET">
    </div>
    <p class="login-sub">NEWS管理画面</p>
    <label class="login-label">パスワード</label>
    <input class="login-input" type="password" id="pwInput" placeholder="パスワードを入力">
    <button class="login-btn" id="loginBtn">ログイン</button>
    <p class="login-err" id="loginErr">パスワードが違います</p>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header class="header">
    <div class="header-logo">
      <img src="images/connect_pet_logo.png" alt="CONNECT PET">
    </div>
    <div class="header-right">
      <a class="header-link" href="/" target="_blank">サイトを見る →</a>
      <button class="logout-btn" id="logoutBtn">ログアウト</button>
    </div>
  </header>

  <div class="layout">
    <!-- LIST -->
    <div class="list-panel">
      <div class="list-head">
        <span class="list-title">投稿一覧</span>
        <button class="btn-new" id="btnNew">＋ 新規作成</button>
      </div>
      <ul class="news-list" id="newsList">
        <li class="list-empty">読み込み中...</li>
      </ul>
    </div>

    <!-- EDITOR -->
    <div class="editor-panel">
      <div class="editor-head">
        <span class="editor-mode" id="editorMode">新規作成</span>
        <div class="editor-btns">
          <button class="btn-draft" id="btnDraft">下書き保存</button>
          <button class="btn-pub" id="btnPublish">公開する</button>
          <button class="btn-del" id="btnDelete" style="display:none">削除</button>
        </div>
      </div>
      <div class="editor-body">

        <div class="field">
          <label class="field-label">タイトル *</label>
          <input class="field-input" id="fTitle" placeholder="記事のタイトルを入力">
        </div>

        <!-- AI文章生成 -->
        <div class="ai-box">
          <div class="ai-head">
            <span class="ai-label">✦ AI文章生成</span>
            <span class="ai-hint">APIキー設定後に使用できます</span>
          </div>
          <div class="ai-row">
            <input class="field-input" id="aiPrompt" placeholder="例：Paw Meとの提携について。保護猫にスマホでごはんをあげるアプリ…">
            <button class="ai-btn" id="aiBtn" onclick="generateAI()">生成</button>
          </div>
        </div>
          <div>
            <label class="field-label">公開日</label>
            <input class="field-input" id="fDate" type="date">
          </div>
          <div>
            <label class="field-label">スラッグ（URL用）</label>
            <input class="field-input" id="fSlug" placeholder="例: news-2026-06">
          </div>
        </div>

        <div class="field">
          <label class="field-label">アイキャッチ画像（クリックまたはD&D）</label>
          <div class="upload-zone" id="uploadZone">
            <div class="upload-empty" id="uploadEmpty">
              <div class="upload-empty-icon">🖼</div>
              <div class="upload-empty-text">クリックまたはドラッグ＆ドロップ</div>
              <div class="upload-empty-sub">JPG・PNG・WebP・GIF 対応</div>
            </div>
            <div class="upload-img-wrap" id="uploadImgWrap">
              <img id="uploadPreviewImg" alt="">
              <button class="upload-img-remove" id="uploadRemoveBtn">✕ 変更</button>
            </div>
            <div class="upload-progress-wrap" id="uploadProgressWrap">
              <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
              <span class="progress-text">アップロード中...</span>
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none">
          <input type="hidden" id="fImage">
        </div>

        <div class="field">
          <label class="field-label">動画（任意）</label>
          <div class="video-zone" id="videoZone" onclick="document.getElementById('videoInput').click()">
            <div class="video-empty" id="videoEmpty">
              <div style="font-size:24px">🎬</div>
              <div style="font-size:13px;font-weight:700;color:var(--ink)">クリックまたはD&Dで動画を追加</div>
              <div style="font-size:11px;color:var(--ink2)">MP4・MOV・WebM 対応（最大50MB）</div>
            </div>
            <div class="video-preview-wrap" id="videoPreviewWrap">
              <video id="videoPreviewEl" controls></video>
              <button class="video-remove" id="videoRemoveBtn">✕ 削除</button>
            </div>
          </div>
          <input type="file" id="videoInput" accept="video/*" style="display:none">
          <input type="hidden" id="fVideo">
        </div>

        <div class="field">
          <label class="field-label">本文</label>
          <div id="quillEditor"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
const SB_URL = 'https://ifccjxzsoozipldjnehu.supabase.co';
const SB_KEY = 'sb_publishable_DXxwbYEqzJlTitVPo9Cciw_UCU6sa7b';
const PASS   = 'connectpet2024';

/* ── SESSION ── */
function isLoggedIn(){ return sessionStorage.getItem('cp_admin') === '1' }
function setLogin(v){ if(v) sessionStorage.setItem('cp_admin','1'); else sessionStorage.removeItem('cp_admin') }

function showLogin(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display   = 'none';
}
function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'block';
  loadList();
}

/* ── INIT ── */
if(isLoggedIn()) showApp(); else showLogin();

/* ── LOGIN ── */
document.getElementById('loginBtn').onclick = function(){
  if(document.getElementById('pwInput').value === PASS){
    setLogin(true); showApp();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
};
document.getElementById('pwInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click() });
document.getElementById('logoutBtn').onclick = function(){ setLogin(false); showLogin() };

/* ── QUILL ── */
const quill = new Quill('#quillEditor',{
  theme:'snow',
  placeholder:'本文を入力してください...',
  modules:{
    toolbar:[
      [{header:[1,2,3,false]}],
      ['bold','italic','underline'],
      [{color:[]},{background:[]}],
      [{list:'ordered'},{list:'bullet'}],
      ['link','image'],
      ['clean']
    ]
  }
});

/* ── STATE ── */
let currentId = null;
let allNews   = [];

/* ── SUPABASE ── */
async function sbRequest(path, method='GET', body=null, prefer=''){
  const opts = {
    method,
    headers:{
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': prefer,
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, opts);
  if(res.status === 204) return null;
  const data = await res.json();
  if(!res.ok) throw new Error(JSON.stringify(data));
  return data;
}

/* ── LOAD LIST ── */
async function loadList(){
  try{
    allNews = await sbRequest('news?select=*&order=published_at.desc,id.desc') || [];
    renderList();
  }catch(e){
    document.getElementById('newsList').innerHTML = '<li class="list-empty">読み込み失敗</li>';
  }
}

function renderList(){
  const ul = document.getElementById('newsList');
  if(!allNews.length){ ul.innerHTML = '<li class="list-empty">投稿がありません</li>'; return; }
  ul.innerHTML = allNews.map(n=>`
    <li class="news-item${currentId===n.id?' active':''}" data-id="${n.id}">
      <div class="item-title">${n.title||'（タイトルなし）'}</div>
      <div class="item-meta">
        <span class="item-date">${n.published_at||''}</span>
        <span class="badge ${n.is_published?'badge-pub':'badge-draft'}">${n.is_published?'公開中':'下書き'}</span>
      </div>
    </li>
  `).join('');
  ul.querySelectorAll('.news-item').forEach(el=>{
    el.addEventListener('click',()=>editPost(parseInt(el.dataset.id)));
  });
}

/* ── NEW POST ── */
document.getElementById('btnNew').onclick = function(){
  currentId = null;
  document.getElementById('editorMode').textContent = '新規作成';
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('fSlug').value = '';
  document.getElementById('fImage').value = '';
  resetUploadUI();
  quill.setText('');
  renderList();
};

/* ── EDIT POST ── */
function editPost(id){
  const n = allNews.find(x=>x.id===id);
  if(!n) return;
  currentId = id;
  document.getElementById('editorMode').textContent = '編集中';
  document.getElementById('btnDelete').style.display = 'inline-block';
  document.getElementById('fTitle').value = n.title||'';
  document.getElementById('fDate').value  = n.published_at||'';
  document.getElementById('fSlug').value  = n.slug||'';
  document.getElementById('fImage').value = n.image_url||'';
  quill.clipboard.dangerouslyPasteHTML(n.body||'');
  if(n.image_url){ showImagePreview(n.image_url) } else { resetUploadUI() }
  renderList();
}

/* ── SAVE ── */
async function savePost(publish){
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ showToast('タイトルを入力してください','err'); return; }
  const payload = {
    title,
    body:         quill.root.innerHTML,
    image_url:    document.getElementById('fImage').value||null,
    published_at: document.getElementById('fDate').value||null,
    slug:         document.getElementById('fSlug').value.trim()||slugify(title),
    is_published: publish,
  };
  try{
    if(currentId){
      await sbRequest(`news?id=eq.${currentId}`,'PATCH',payload,'return=minimal');
      allNews = allNews.map(n=>n.id===currentId?{...n,...payload}:n);
    } else {
      const res = await sbRequest('news','POST',payload,'return=representation');
      if(res&&res[0]){ currentId=res[0].id; allNews=[res[0],...allNews]; }
    }
    document.getElementById('editorMode').textContent = '編集中';
    document.getElementById('btnDelete').style.display = 'inline-block';
    renderList();
    showToast(publish?'公開しました！':'下書きを保存しました','ok');
  }catch(e){
    showToast('保存に失敗しました','err');
    console.error(e);
  }
}

document.getElementById('btnDraft').onclick   = ()=>savePost(false);
document.getElementById('btnPublish').onclick = ()=>savePost(true);

/* ── DELETE ── */
document.getElementById('btnDelete').onclick = async function(){
  if(!currentId||!confirm('この記事を削除しますか？')) return;
  try{
    await sbRequest(`news?id=eq.${currentId}`,'DELETE',null,'return=minimal');
    allNews = allNews.filter(n=>n.id!==currentId);
    document.getElementById('btnNew').click();
    showToast('削除しました','ok');
  }catch(e){ showToast('削除に失敗しました','err') }
};

/* ── IMAGE UPLOAD ── */
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('click', ()=>document.getElementById('fileInput').click());
uploadZone.addEventListener('dragover', e=>{ e.preventDefault(); uploadZone.classList.add('drag') });
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e=>{ e.preventDefault(); uploadZone.classList.remove('drag'); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) uploadFile(f) });
document.getElementById('fileInput').onchange = function(){ if(this.files[0]) uploadFile(this.files[0]) };
document.getElementById('uploadRemoveBtn').onclick = function(e){ e.stopPropagation(); document.getElementById('fImage').value=''; resetUploadUI() };

async function uploadFile(file){
  showProgressUI();
  const fill = document.getElementById('progressFill');
  let p=0; const t=setInterval(()=>{ p=Math.min(p+Math.random()*15,88); fill.style.width=p+'%' },200);
  try{
    const ext=file.name.split('.').pop();
    const name=`${Date.now()}.${ext}`;
    const res=await fetch(`${SB_URL}/storage/v1/object/news-images/${name}`,{
      method:'POST',
      headers:{ 'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true' },
      body:file
    });
    if(!res.ok) throw new Error(await res.text());
    clearInterval(t); fill.style.width='100%';
    const url=`${SB_URL}/storage/v1/object/public/news-images/${name}`;
    document.getElementById('fImage').value=url;
    setTimeout(()=>showImagePreview(url),400);
    showToast('画像をアップロードしました','ok');
  }catch(e){ clearInterval(t); resetUploadUI(); showToast('アップロード失敗: '+e.message,'err') }
}

function resetUploadUI(){
  document.getElementById('uploadEmpty').style.display    = 'flex';
  document.getElementById('uploadImgWrap').style.display  = 'none';
  document.getElementById('uploadProgressWrap').style.display = 'none';
}
function showProgressUI(){
  document.getElementById('uploadEmpty').style.display    = 'none';
  document.getElementById('uploadImgWrap').style.display  = 'none';
  document.getElementById('uploadProgressWrap').style.display = 'flex';
}
function showImagePreview(url){
  document.getElementById('uploadEmpty').style.display    = 'none';
  document.getElementById('uploadProgressWrap').style.display = 'none';
  document.getElementById('uploadPreviewImg').src         = url;
  document.getElementById('uploadImgWrap').style.display  = 'block';
}

/* ── VIDEO UPLOAD ── */
const videoZone = document.getElementById('videoZone');
videoZone.addEventListener('dragover', e=>{e.preventDefault(); videoZone.style.borderColor='var(--or)'});
videoZone.addEventListener('dragleave', ()=>videoZone.style.borderColor='');
videoZone.addEventListener('drop', e=>{e.preventDefault(); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('video/')) uploadVideo(f)});
document.getElementById('videoInput').onchange = function(){ if(this.files[0]) uploadVideo(this.files[0]) };
document.getElementById('videoRemoveBtn').onclick = function(e){
  e.stopPropagation();
  document.getElementById('fVideo').value='';
  document.getElementById('videoPreviewWrap').style.display='none';
  document.getElementById('videoEmpty').style.display='flex';
};

async function uploadVideo(file){
  if(file.size > 52428800){ showToast('ファイルサイズが50MBを超えています','err'); return; }
  document.getElementById('videoEmpty').style.display='none';
  showToast('動画をアップロード中...','ok');
  try{
    const ext=file.name.split('.').pop();
    const name=`video-${Date.now()}.${ext}`;
    const res=await fetch(`${SB_URL}/storage/v1/object/news-images/${name}`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':file.type,'x-upsert':'true'},
      body:file
    });
    if(!res.ok) throw new Error(await res.text());
    const url=`${SB_URL}/storage/v1/object/public/news-images/${name}`;
    document.getElementById('fVideo').value=url;
    document.getElementById('videoPreviewEl').src=url;
    document.getElementById('videoPreviewWrap').style.display='block';
    showToast('動画をアップロードしました','ok');
  }catch(e){ document.getElementById('videoEmpty').style.display='flex'; showToast('動画アップロード失敗','err') }
}

/* ── AI GENERATION ── */
const AI_KEY = ''; /* ← Claude APIキーをここに入力 */
async function generateAI(){
  const prompt = document.getElementById('aiPrompt').value.trim();
  if(!prompt){ showToast('キーワードを入力してください','err'); return; }
  if(!AI_KEY){ showToast('APIキーが未設定です。admin.htmlのAI_KEYに入力してください','err'); return; }
  const btn = document.getElementById('aiBtn');
  btn.disabled=true; btn.textContent='生成中...';
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':AI_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1200,
        messages:[{role:'user',content:`Connect Pet（ペットの殺処分ゼロを目指す会社）のNEWS記事を日本語で書いてください。
自然で人間らしい文章で、丁寧かつ読みやすく。
内容：${prompt}
JSON形式で返してください：{"title":"タイトル","body":"<p>本文HTML（段落・太字・リスト使用可）</p>"}`}]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text||'';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    if(parsed.title) document.getElementById('fTitle').value=parsed.title;
    if(parsed.body) quill.clipboard.dangerouslyPasteHTML(parsed.body);
    showToast('AI生成完了！編集してから保存してください','ok');
  }catch(e){ showToast('AI生成失敗：'+e.message,'err') }
  btn.disabled=false; btn.textContent='生成';
}

/* ── UTILS ── */
function slugify(s){ return s.toLowerCase().replace(/\s+/g,'-').replace(/[^\w\-]/g,'').slice(0,60)||'post-'+Date.now() }
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type;
  t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',3500);
}

/* 今日の日付をデフォルトに */
document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
</script>
